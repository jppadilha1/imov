<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e7d32",
                        "background-light": "#ffffff",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Roboto", "sans-serif"],
                        "sans": ["Roboto", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Roboto', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-filled {
            font-family: 'Material Symbols Outlined';
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto border-x border-slate-100 dark:border-slate-800">
<!-- Top App Bar (Material Design 3 Style) -->
<header class="flex items-center h-16 px-4 bg-background-light dark:bg-background-dark border-b border-slate-100 dark:border-slate-800 shrink-0">
<button class="p-2 -ml-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">arrow_back</span>
</button>
<h1 class="ml-4 text-xl font-medium text-slate-900 dark:text-slate-100">Nova Captura</h1>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center p-6 space-y-8">
<!-- Camera Interaction Area -->
<div class="flex flex-col items-center justify-center space-y-4 w-full">
<div class="w-64 h-64 rounded-3xl bg-slate-50 dark:bg-slate-900 border-2 border-dashed border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center group cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
<span class="material-symbols-outlined text-[80px] text-slate-300 dark:text-slate-600">photo_camera</span>
<p class="text-slate-500 dark:text-slate-400 font-medium mt-2">Toque para fotografar</p>
</div>
</div>
<!-- Action Button -->
<div class="w-full max-w-xs pt-4">
<button class="w-full flex items-center justify-center gap-3 bg-primary hover:opacity-90 text-white py-4 rounded-full shadow-lg shadow-primary/20 transition-all active:scale-95">
<span class="material-symbols-outlined">camera</span>
<span class="font-bold tracking-wide uppercase text-sm">Tirar Foto</span>
</button>
</div>
</main>
<!-- Status Bar -->
<div class="flex items-center justify-center py-3 bg-primary/5 dark:bg-primary/10">
<div class="flex items-center gap-2 text-primary font-medium text-sm">
<span class="material-symbols-outlined text-base">location_on</span>
<span>Aguardando GPS...</span>
</div>
</div>
<!-- Bottom Navigation Bar (Material Design 3) -->
<nav class="flex h-20 border-t border-slate-100 dark:border-slate-800 bg-background-light dark:bg-background-dark px-2 shrink-0">
<!-- Mapa -->
<a class="flex flex-1 flex-col items-center justify-center gap-1 group" href="#"><div class="flex items-center justify-center h-8 w-16 rounded-full group-hover:bg-slate-100 dark:group-hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">location_on</span>
</div>
<span class="text-xs font-medium text-slate-600 dark:text-slate-400">Mapa</span></a>
<!-- Captura (Active State) -->
<a class="flex flex-1 flex-col items-center justify-center gap-1 group" href="#">
<div class="flex items-center justify-center h-8 w-16 rounded-full bg-primary/20 transition-colors">
<span class="material-symbols-filled text-primary">photo_camera</span>
</div>
<span class="text-xs font-bold text-slate-900 dark:text-slate-100">Captura</span>
</a>
<!-- Lista -->
<a class="flex flex-1 flex-col items-center justify-center gap-1 group" href="#"><div class="flex items-center justify-center h-8 w-16 rounded-full group-hover:bg-slate-100 dark:group-hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">description</span>
</div>
<span class="text-xs font-medium text-slate-600 dark:text-slate-400">Lista</span></a>
</nav>
<!-- Android Home Indicator Placeholder -->
<div class="h-1 bg-background-light dark:bg-background-dark flex justify-center pb-2">
<div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
</div>
</div>
</body></html>
